<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, user-scalable=yes">
<meta name="theme-color" content="#10b6d6">
<title>NOS Alive — Guia</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NOS Alive">
<style>
  :root{
    --bg:#ffffff; --ink:#0a0a0a; --mut:#6b6b6b; --line:#ececec;
    --accent:#ffd400; --accent2:#e0148c; --card:#ffffff;
    --nav-h:60px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#111;}
  body{
    max-width:480px; margin:0 auto; background:var(--bg); color:var(--ink);
    min-height:100vh; min-height:100dvh; overflow-x:hidden;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
  }
  h1,h2,h3{margin:0; font-weight:800; letter-spacing:-0.02em;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}

  /* ---------- Top bar ---------- */
  header.top{
    position:sticky; top:0; z-index:20; background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  /* Faixa azul com o logótipo oficial */
  .hero{position:relative;
    background:linear-gradient(105deg,#10b6d6 0%, #3cc0e6 55%, #56c9ec 100%);
    padding:calc(18px + env(safe-area-inset-top)) 20px 18px;
    display:flex; align-items:center;}
  .hero-logo{height:96px; width:auto; display:block;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.12));}
  .hero-search{position:absolute; top:calc(14px + env(safe-area-inset-top)); right:14px;
    width:44px; height:44px; background:rgba(0,0,0,.18); color:#fff;
    display:flex; align-items:center; justify-content:center;}
  .hero-search svg{width:22px; height:22px;}
  /* Avatar do utilizador — bola no canto, à esquerda da lupa */
  .hero-avatar{position:absolute; top:calc(18px + env(safe-area-inset-top)); right:66px;
    width:90px; height:90px; border-radius:50%; object-fit:cover; object-position:center top;
    border:3px solid #fff; box-shadow:0 2px 7px rgba(0,0,0,.32); background:#fff; cursor:pointer;}

  /* Cartão de perfil (abre ao tocar na foto) */
  .profile{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:70;
    display:none; align-items:center; justify-content:center; padding:24px;}
  .profile.open{display:flex;}
  .profile-card{background:var(--bg); width:100%; max-width:340px; border:2px solid var(--ink);
    padding:26px 22px 22px; text-align:center; position:relative;}
  .profile-close{position:absolute; top:8px; right:10px; font-size:22px; font-weight:800; color:var(--mut); line-height:1;}
  .profile-photo{width:104px; height:104px; border-radius:50%; object-fit:cover; object-position:center top;
    border:3px solid var(--ink); margin:0 auto 12px; display:block;}
  .profile-name{font-size:22px; font-weight:900; letter-spacing:-0.02em;}
  .profile-sub{font-size:13px; font-weight:600; color:var(--mut); margin-top:2px;}
  .profile-links{display:flex; flex-direction:column; gap:9px; margin-top:18px;}
  .profile-links a{display:flex; align-items:center; justify-content:center; gap:8px;
    padding:13px; color:#fff; font-size:14px; font-weight:800; text-transform:uppercase;
    letter-spacing:.02em; text-decoration:none;}
  /* Barra com os dias + relógio */
  .subbar{display:flex; align-items:center; justify-content:flex-end; gap:8px; padding:0 12px;}
  .subbar .days{flex:1 1 auto; min-width:0;}

  /* Relógio — caixa preta ao lado dos dias (mesma font da app) */
  .clock{flex:0 0 auto; display:inline-flex; align-items:center; background:var(--ink); color:#fff;
    padding:8px 13px; box-shadow:0 1px 4px rgba(0,0,0,.2);}
  /* espaçamento entre dígitos maior; a margem negativa anula o espaço que
     o letter-spacing deixa depois do último dígito, mantendo-o centrado */
  .clock-t{font-size:20px; font-weight:800; letter-spacing:.16em; margin-right:-.16em;
    line-height:1; font-variant-numeric:tabular-nums;}

  /* Day strip */
  .days{display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .day{flex:0 0 auto; text-align:center; padding:6px 4px; width:60px;}
  .day .dow{font-size:10px; font-weight:800; color:var(--mut); letter-spacing:.06em; line-height:1;}
  .day .num{font-size:22px; font-weight:800;
    width:40px;height:40px;line-height:40px;border-radius:50%;margin:9px auto 0;}
  .day.active .dow{color:var(--ink);}
  .day.active .num{background:var(--accent); color:#000;}

  /* ---------- Filters bar ---------- */
  .fbar{display:flex; gap:8px; overflow-x:auto; padding:10px 16px; scrollbar-width:none;
    border-bottom:1px solid var(--line); background:var(--bg);
    position:sticky; top:0; z-index:10;}
  .fbar::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto; border:2px solid var(--ink); padding:0 15px; min-height:44px;
    font-size:13px; font-weight:800; white-space:nowrap; display:flex; align-items:center; gap:6px;
    text-transform:uppercase; letter-spacing:.02em;}
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .chip .sw{width:9px;height:9px;}
  /* Chips de palco — preenchidos com a cor sólida do palco */
  .chip.stage-chip{border-width:2px;}
  .chip.stage-chip.on{box-shadow:0 0 0 2.5px var(--ink);}
  .count{font-size:12px;color:var(--mut);font-weight:700;padding:10px 16px 2px;}

  /* ---------- Cards ---------- */
  .daylabel{font-weight:900; font-size:13px; letter-spacing:.02em; padding:16px 16px 6px; text-transform:uppercase;}
  .now-line{display:flex;align-items:center;gap:8px;padding:4px 16px 10px;}
  .now-line .bar{flex:1;height:1px;background:var(--accent2);}
  .now-line .lbl{font-size:11px;font-weight:800;color:var(--accent2);letter-spacing:.08em;}

  .card{margin:0 16px 12px; border:1.5px solid var(--ink); overflow:hidden; background:var(--card);}
  .card.live{border-color:var(--accent2); box-shadow:0 0 0 1px var(--accent2);}
  /* Etiqueta "Para ti" dentro do cartão (por defeito, texto simples) */
  .reco{margin-top:9px; font-size:12px; font-weight:800; color:#6b5200;
    display:flex; flex-direction:column; gap:2px;}
  .reco span{font-weight:600; color:#7a6320; font-size:12px; line-height:1.35;}

  /* CARTÃO RECOMENDADO — caixa cheia de cor sólida (amarelo festival) */
  .card.rec{background:var(--accent); border-color:var(--accent);}
  .card.rec .c-meta{color:#5c4a00;}
  .card.rec .c-meta .stg{color:#000;}
  .card.rec .reco{color:#000;}
  .card.rec .reco span{color:#4a3c00;}
  .card.rec .c-foot{border-top-color:rgba(0,0,0,.14);}
  .card.rec .fav{background:#fff; border-color:#000;}
  .card.rec .fav.on{background:#000; color:#fff; border-color:#000;}

  /* JÁ ESTÁ NA TUA PLAYLIST — verde (vs amarelo = sugestão) */
  .card.rec.playlist{background:#4ade80; border-color:#4ade80;}
  .card.rec.playlist .c-meta{color:#14532d;}
  .card.rec.playlist .reco span{color:#14532d;}

  .chip.reco-chip{border-color:#e6bf00;}
  .chip.reco-chip.on{background:var(--accent); color:#000; border-color:var(--accent);}

  /* CONCERTO QUE JÁ TERMINOU — passa a cinza (vence o amarelo do recomendado) */
  .card.past{background:#f6f6f6 !important; border-color:#ececec !important;}
  .card.past .card-b{border-left-color:#d6d6d6 !important;}
  /* Cinzentos legíveis (>=4.5:1 sobre #f6f6f6). O "passado" sinaliza-se pelo
     fundo cinza + foto a p&b + etiqueta, não por texto ilegível. */
  .card.past .c-time,
  .card.past .c-title{color:#6e6e6e !important;}
  .card.past .c-meta,
  .card.past .c-meta .stg,
  .card.past .reco,
  .card.past .reco span{color:#6e6e6e !important;}
  .card.past .c-meta .sw,
  .card.past .stg .sw{background:#b4b4b4 !important;}
  .card.past .c-foot{border-top-color:#e4e4e4 !important;}
  .card.past .fav{background:#fff !important; border-color:#a9a9a9 !important; color:#6e6e6e !important;}
  .card.past .fav.on{background:#6e6e6e !important; border-color:#6e6e6e !important; color:#fff !important;}
  .c-time .past-tag{background:#e3e3e3; color:#5f5f5f; font-size:10px; font-weight:800;
    padding:2px 7px; margin-left:8px; letter-spacing:.05em;}
  .card-b{padding:14px 14px 12px; border-left:5px solid var(--stage,#999); display:flex; gap:12px; align-items:flex-start;}
  .c-main{flex:1 1 auto; min-width:0;}
  .c-thumb{flex:0 0 auto; width:70px; height:70px; object-fit:cover; display:block;}
  .card.past .c-thumb{filter:grayscale(1) opacity(.55);}
  .c-time{font-size:13px; font-weight:700;}
  .c-time .live-tag{background:var(--accent2);color:#fff;font-size:10px;font-weight:800;
    padding:2px 7px;margin-left:8px;letter-spacing:.05em;}
  .c-time .next-tag{background:var(--accent);color:#000;font-size:10px;font-weight:800;
    padding:2px 7px;margin-left:8px;letter-spacing:.05em;}
  .c-title{font-size:19px; font-weight:800; margin:7px 0 6px; letter-spacing:-0.02em;}
  .c-meta{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--mut); font-weight:600;}
  .c-meta .stg{display:inline-flex;align-items:center;gap:5px;color:var(--ink);}
  .c-meta .stg .sw{width:10px;height:10px;}
  .c-foot{display:flex;align-items:center;justify-content:space-between;
    border-top:1px solid var(--line); padding:8px 14px;}
  .fav{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;
    border:2px solid var(--ink);padding:0 16px;min-height:44px;
    text-transform:uppercase;letter-spacing:.03em;}
  .fav.on{background:var(--accent);border-color:var(--accent);}
  .fav svg{width:15px;height:15px;}
  .conflict{font-size:11px;font-weight:800;color:#c81e1e;display:flex;align-items:center;gap:5px;
    line-height:1.25;padding-right:8px;}
  .conflict svg{width:15px;height:15px;flex:0 0 auto;}

  /* Bloco de tempo livre entre dois concertos da agenda */
  .gap{margin:0 16px 12px; border:2px dashed #b4b4b4; background:#fafafa; padding:12px 14px;}
  .gap-t{font-size:15px; font-weight:800; color:#2b2b2b; letter-spacing:-0.01em;}
  .gap-s{font-size:12px; font-weight:600; color:#6e6e6e; margin-top:3px;}

  .empty{text-align:center;color:var(--mut);padding:60px 30px;font-weight:600;font-size:14px;}
  .empty b{color:var(--ink);display:block;font-size:16px;margin-bottom:6px;}

  /* ---------- Map (imagem oficial + pinos) ---------- */
  .map-wrap{padding:8px 16px 24px;}
  .rmap-scroll{overflow:auto; -webkit-overflow-scrolling:touch; border:1.5px solid var(--ink); background:#eaf3f6;}
  .rmap{position:relative; width:100%;}
  .rmap img{display:block; width:100%; height:auto; user-select:none;}
  .rpin{position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column;
    align-items:center; gap:2px; pointer-events:none;}
  .rpin{transition:transform .15s ease;}
  .rdot{width:15px; height:15px; box-shadow:0 0 0 3px #fff, 0 1px 4px rgba(0,0,0,.5); transition:transform .15s ease;}
  .rlbl{display:none; position:absolute; top:-24px; left:50%; transform:translateX(-50%);
    font-size:11px; font-weight:800; background:#000; color:#fff; padding:2px 7px;
    white-space:nowrap; letter-spacing:.02em; box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .rpin.hi{z-index:6;}
  .rpin.hi .rdot{transform:scale(1.55); box-shadow:0 0 0 3px #fff, 0 0 0 5px var(--ink), 0 1px 5px rgba(0,0,0,.5);}
  .rpin.hi .rlbl{display:block;}
  .legend{display:flex;flex-wrap:wrap;gap:8px;padding:14px 4px 0;}
  .legend .leg{font-size:12px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px;
    border:1.5px solid var(--line);padding:5px 9px;cursor:pointer;}
  .legend .leg:active{background:#f2f2f2;}
  .legend .sw{width:12px;height:12px;}

  /* ---------- Bottom nav ---------- */
  nav.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    height:calc(var(--nav-h) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
    background:var(--bg);border-top:1px solid var(--line);display:flex;z-index:30;}
  nav.bottom button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font-size:9.5px;font-weight:800;color:var(--mut);letter-spacing:0;padding:0 2px;}
  nav.bottom button.on{color:var(--ink);}
  nav.bottom svg{width:21px;height:21px;}

  /* Aba Assistente */
  .assist-wrap{padding:20px 16px 40px;}
  .assist-card{border:1.5px solid var(--ink); padding:24px 20px; text-align:center;}
  .assist-emoji{font-size:44px; line-height:1; margin-bottom:8px;}
  .assist-card h2{font-size:22px; font-weight:900; letter-spacing:-0.02em; margin-bottom:8px;}
  .assist-card p{font-size:14px; color:var(--mut); font-weight:500; line-height:1.5; margin-bottom:20px;}
  .assist-btn{display:inline-flex; align-items:center; gap:8px; width:100%; justify-content:center;
    background:var(--ink); color:#fff; font-size:15px; font-weight:800; text-transform:uppercase;
    letter-spacing:.03em; padding:16px; border:2px solid var(--ink);}
  .assist-note{font-size:12px; color:var(--mut); font-weight:600; margin-top:14px; line-height:1.4;}
  .info-block{border:1.5px solid var(--ink); margin-bottom:10px;}
  .info-t{background:var(--ink); color:#fff; font-size:11px; font-weight:800; text-transform:uppercase;
    letter-spacing:.06em; padding:7px 12px;}
  .info-c{padding:12px; font-size:13px; line-height:1.5; color:#222; font-weight:500;}
  .info-list{margin:0; padding-left:18px;}
  .info-list li{margin-bottom:6px;}
  nav.bottom .badge{position:absolute;top:8px;margin-left:20px;background:var(--accent2);color:#fff;
    font-size:9px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

  .banner{margin:12px 16px 0;background:#fff7cc;border:1.5px solid #e6c34a;
    padding:10px 12px;font-size:12px;font-weight:600;color:#7a5b00;line-height:1.4;}

  .card{cursor:pointer; transition:transform .08s ease;}
  .card:active{transform:scale(.985);}

  /* ---------- Detail sheet ---------- */
  .sheet{position:fixed; inset:0; max-width:480px; margin:0 auto; background:var(--bg);
    z-index:50; transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column; overflow-y:auto; overscroll-behavior:contain;}
  .sheet.open{transform:translateY(0);}
  .sheet-hd{color:#fff; padding:calc(12px + env(safe-area-inset-top)) 20px 26px; position:relative;}
  .sheet-hd.has-img{padding-top:calc(90px + env(safe-area-inset-top));}
  .sheet-hd::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.12),rgba(0,0,0,.28)); z-index:0;}
  .sheet-hd.has-img::after{background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,rgba(0,0,0,.15) 45%,rgba(0,0,0,.72) 100%);}
  .sheet-hd > *{position:relative; z-index:1;}
  .sheet-top{display:flex; justify-content:space-between; margin-bottom:24px;}
  .s-btn{width:44px; height:44px; background:rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; color:#fff;}
  .s-btn svg{width:20px; height:20px; fill:none; stroke:#fff; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round;}
  .sheet-stage{display:flex; align-items:center; gap:7px; font-size:12px; font-weight:800;
    letter-spacing:.05em; text-transform:uppercase; opacity:.95;}
  .sheet-stage .sw{width:11px; height:11px;}
  .sheet-title{font-size:34px; line-height:1.02; font-weight:900; letter-spacing:-0.03em; margin:10px 0 8px;}
  .sheet-time{font-size:15px; font-weight:700; opacity:.95;}
  .sheet-body{flex:1;}
  .sec-lbl{background:var(--accent); color:#000; font-size:11px; font-weight:800;
    letter-spacing:.08em; text-transform:uppercase; padding:7px 20px;}
  .sec-lbl.warn-lbl{background:#ffd9d9; color:#b01818;}
  .sec-body{padding:14px 20px; border-bottom:1px solid var(--line); font-size:14px;}
  .info-row{display:flex; justify-content:space-between; align-items:center; padding:6px 0; gap:16px;}
  .info-row span{color:var(--mut); font-weight:600;}
  .info-row b{font-weight:800; text-align:right;}
  .bio-body{line-height:1.55; color:#222; font-weight:500;}
  .lk-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;}
  .lk{display:inline-flex; align-items:center; gap:6px; padding:10px 15px; font-size:13px; font-weight:800;
    text-transform:uppercase; letter-spacing:.02em; text-decoration:none; color:#fff;}
  .lk-sp{background:#1db954;}
  .lk-yt{background:#ff0000;}
  .lk-web{background:var(--ink);}
  .reco-body{color:#7a5b00; font-weight:600; background:#fffbe9;}
  .reco-body.playlist{color:#14532d; background:#f0fdf4;}
  .sec-lbl.playlist-lbl{background:#4ade80; color:#000;}
  .conf-row{display:flex; flex-direction:column; padding:5px 0;}
  .conf-row span{color:var(--mut); font-size:12px; font-weight:600;}
  .sheet-cta{position:sticky; bottom:0; background:var(--bg); border-top:1px solid var(--line);
    padding:14px 20px calc(16px + env(safe-area-inset-bottom));}
  .sheet-cta button{width:100%; padding:17px; font-size:16px; font-weight:800; text-transform:uppercase;
    letter-spacing:.03em; border:2px solid var(--ink); display:flex; align-items:center; justify-content:center; gap:9px;}
  .sheet-cta button svg{width:19px; height:19px;}
  .sheet-cta button.on{background:var(--accent); border-color:var(--accent);}

  /* ---------- Pesquisa ---------- */
  .search{position:fixed; inset:0; max-width:480px; margin:0 auto; background:var(--bg);
    z-index:60; display:none; flex-direction:column;}
  .search.open{display:flex;}
  .search-bar{display:flex; align-items:center; gap:8px; padding:calc(10px + env(safe-area-inset-top)) 12px 10px;
    border-bottom:2px solid var(--ink);}
  .search-ic{width:22px; height:22px; flex:0 0 auto; color:var(--mut); margin-left:4px;}
  #searchInput{flex:1 1 auto; min-width:0; border:none; outline:none; background:transparent;
    font-size:18px; font-weight:700; font-family:inherit; color:var(--ink); padding:8px 4px;}
  .search-cancel{flex:0 0 auto; font-size:14px; font-weight:800; color:var(--ink); padding:8px;}
  .search-results{flex:1 1 auto; overflow-y:auto; overscroll-behavior:contain;}
  .search-hint{padding:40px 24px; text-align:center; color:var(--mut); font-weight:600; font-size:14px;}
  .sres{display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:10px 14px; border-bottom:1px solid var(--line); background:none;}
  .sres:active{background:#f4f4f4;}
  .sres-img{width:50px; height:50px; flex:0 0 auto; object-fit:cover; display:block;}
  .sres-main{display:flex; flex-direction:column; gap:3px; min-width:0;}
  .sres-title{font-size:16px; font-weight:800; letter-spacing:-0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .sres-sub{font-size:12px; font-weight:600; color:var(--mut); display:flex; align-items:center; gap:6px;}
  .sres-sub .sw{width:9px; height:9px; flex:0 0 auto;}

  /* ============================================================
     NEOBRUTALISMO — camada única. Apagar este bloco reverte tudo.
     Regra da sombra: elementos claros -> sombra preta.
                      elementos escuros -> sombra cinza (senão não se vê).
                      "a tocar agora"   -> sombra magenta (a única colorida).
     ============================================================ */
  :root{ --nbsh:#000; --nbw:3px; }

  /* Estrutura: tudo separado por linhas pretas grossas */
  .hero{ background:#2fbfe0; border-bottom:var(--nbw) solid var(--ink); }
  header.top{ border-bottom:var(--nbw) solid var(--ink); }
  .fbar{ border-bottom:var(--nbw) solid var(--ink); padding:10px 16px 15px; }
  nav.bottom{ border-top:var(--nbw) solid var(--ink); }

  /* Cartões: borda grossa + sombra dura */
  .card{ border:var(--nbw) solid var(--ink); box-shadow:5px 5px 0 var(--nbsh); margin-bottom:19px; }
  .card.live{ --nbsh:var(--accent2); box-shadow:5px 5px 0 var(--accent2); }
  .card.past{ --nbsh:#c4c4c4; border-color:#a9a9a9 !important; box-shadow:5px 5px 0 #c4c4c4 !important; }
  .c-title{ font-weight:900; letter-spacing:-0.03em; }

  /* Controlos: borda grossa + sombra dura + "afundar" ao carregar */
  .chip, .fav, .lk, .assist-btn, .sheet-cta button, .profile-links a,
  .hero-search, .s-btn, .info-block, .profile-card, .gap, .banner, .rmap-scroll{
    border:var(--nbw) solid var(--ink);
    box-shadow:4px 4px 0 var(--nbsh);
  }
  .lk{ color:#fff; }
  .chip.on, .clock, .assist-btn, .lk-web,
  .fav.on, .card.rec .fav.on, .card.past .fav.on{ --nbsh:#b9b9b9; }
  .clock{ box-shadow:4px 4px 0 #c4c4c4; }

  .card:active, .chip:active, .fav:active, .lk:active, .assist-btn:active,
  .sheet-cta button:active, .profile-links a:active, .hero-search:active, .s-btn:active{
    transform:translate(3px,3px);
    box-shadow:1px 1px 0 var(--nbsh);
  }

  /* Detalhes */
  .hero-search{ background:#fff; color:var(--ink); }
  .hero-avatar{ border:var(--nbw) solid var(--ink); box-shadow:4px 4px 0 var(--ink); }
  .day.active .num{ box-shadow:0 0 0 var(--nbw) var(--ink); }
  nav.bottom .badge{ border:2px solid var(--ink); }
  .sheet-hd{ border-bottom:var(--nbw) solid var(--ink); }
  .search-bar{ border-bottom:var(--nbw) solid var(--ink); }

  /* Tempo livre: tracejado -> hachurado, que é o que "vazio" parece */
  .gap{ background:repeating-linear-gradient(45deg,#fff 0 9px,#f1f1f1 9px 18px); }
  .gap-s{ color:#5f5f5f; }

  /* Barra inferior: 5 blocos divididos por linhas pretas.
     O separador ativo inverte-se (preto sólido, conteúdo branco) — neutro,
     para não roubar significado ao amarelo/magenta. */
  nav.bottom{ background:#fff; }
  nav.bottom button{ border-right:var(--nbw) solid var(--ink);
    text-transform:uppercase; letter-spacing:.03em; color:#5f5f5f; }
  nav.bottom button:last-child{ border-right:none; }
  nav.bottom svg{ stroke-width:2.4; }
  nav.bottom button.on{ background:var(--ink); color:#fff; }
  nav.bottom button.on .badge{ border-color:#fff; }
  nav.bottom button:active{ background:#dcdcdc; }
  nav.bottom button.on:active{ background:#333; }

  /* Rodapé do cartão = cor sólida do palco. O botão e o aviso ficam em
     blocos brancos, para o contraste não depender da cor do palco. */
  .c-foot{ background:var(--stage,#fff); border-top:var(--nbw) solid var(--ink); }
  .fav{ background:#fff; }
  .conflict{ background:#fff; border:2px solid var(--ink); padding:7px 9px; }
  .card.past .c-foot{ background:#e6e6e6 !important; border-top-color:#a9a9a9 !important; }
</style>
</head>
<body>
  <header class="top">
    <div class="hero">
      <img class="hero-logo" src="assets/logo-branco.png" alt="NOS Alive '26 — Oeiras">
      <button class="hero-search" onclick="openSearch()" aria-label="Pesquisar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </button>
      <img class="hero-avatar" src="assets/me.jpg" alt="Perfil" onclick="openProfile()" onerror="this.style.display='none'">
    </div>
    <div class="subbar">
      <div class="days" id="days"></div>
      <div class="clock" id="clock">
        <span class="clock-t" id="clockT">--:--</span>
      </div>
    </div>
  </header>

  <main id="view"></main>

  <nav class="bottom">
    <button data-tab="all" class="on" aria-label="Programa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
      Programa</button>
    <button data-tab="mine" aria-label="Agenda" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H7a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><rect x="9" y="2.5" width="6" height="3.5" rx="1"/><path d="M8.5 13l2.2 2.2 4.3-4.4"/></svg>
      <span class="badge" id="mineBadge" style="display:none">0</span>
      Agenda</button>
    <button data-tab="now" aria-label="Agora">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Agora</button>
    <button data-tab="map" aria-label="Mapa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3L3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"/><path d="M9 3v15M15 6v15"/></svg>
      Mapa</button>
    <button data-tab="assist" aria-label="Assistente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Assistente</button>
  </nav>

  <div class="sheet" id="sheet"></div>

  <div class="profile" id="profile" onclick="if(event.target===this)closeProfile()">
    <div class="profile-card" id="profileCard"></div>
  </div>

  <div class="search" id="search">
    <div class="search-bar">
      <svg class="search-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" type="search" placeholder="Procurar artista, palco…" oninput="runSearch(this.value)" autocomplete="off">
      <button class="search-cancel" onclick="closeSearch()">Cancelar</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- ?v= é carimbado pelo deploy.sh a cada publicação, para o browser
       nunca servir uma versão antiga em cache -->
  <script src="data.js?v=1783692832"></script>
  <script src="artists.js?v=1783692832"></script>
  <script src="bios.js?v=1783692832"></script>
  <script src="links.js?v=1783692832"></script>
  <script src="app.js?v=1783692832"></script>
</body>
</html>
